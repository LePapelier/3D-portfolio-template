name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate email SVG
        env:
          EMAIL: ${{ secrets.EMAIL }}
        run: node scripts/generate-email-svg.mjs --email "${EMAIL}" --font "public/fonts/Lato-Regular.ttf" --out "public/private-contact/email.svg"

      - name: Set base URL
        run: |
          # Use '/' if a real custom domain is set in public/CNAME; otherwise use the repo name sub-path.
          # The placeholder value 'your-portfolio.example.com' means no custom domain is configured.
          PLACEHOLDER="your-portfolio.example.com"
          if [ -f public/CNAME ]; then
            CNAME=$(cat public/CNAME)
          else
            CNAME=""
          fi
          if [ -n "$CNAME" ] && [ "$CNAME" != "$PLACEHOLDER" ]; then
            echo "VITE_BASE_URL=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_URL=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
